services:
  server:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ${SERVER_ENV_FILE:-./.env}
    environment:
      PORT: ${SERVER_INTERNAL_PORT:-8888}
      REDIS_URL: ${SERVER_REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    volumes:
      - server_logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "8"
    expose:
      - "8888"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - server
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "8"
    ports:
      - "${SERVER_PUBLIC_PORT:-8888}:80"
    volumes:
      - ./nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

volumes:
  server_logs:
  redis_data:

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: ${SERVER_BACKEND_SUBNET:-172.20.0.0/24}
